name: Change proposal
description: Propose a change to the template, specs, or methodology
labels: ["change-proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Change proposals that affect **constitutional (Tier-0 / Tier-1) elements**
        require the 4-gate Informed-Upheaval Protocol documented in
        `openspec/constitution.md` and the template at
        `openspec/changes/templates/constitution-override/proposal.md`.

        Non-constitutional changes follow the standard OpenSpec change flow in
        `CONTRIBUTING.md`.

  - type: textarea
    id: summary
    attributes:
      label: Change summary
      description: What do you want to change and why?
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Constitutional tier
      description: Is this change constitutional (Tier-0/Tier-1) or routine (Tier-2)?
      options:
        - "Tier-2 — routine change"
        - "Tier-1 — significant; may require Informed-Upheaval Protocol"
        - "Tier-0 — constitutional; requires Informed-Upheaval Protocol"
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Affected specs / ADRs / invariants
      description: "e.g. INV-11, CONST-02, openspec/specs/naming-rules/spec.md"
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: |
        Why is this change necessary? What breaks without it?
        If constitutional: what principle are you sacrificing and why is that acceptable?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks and regressions
      description: What could break? How will you verify?
    validations:
      required: true
